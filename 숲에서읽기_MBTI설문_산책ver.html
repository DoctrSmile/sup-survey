<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>숲에서 읽기 — 나는 어떤 산책 유형일까?</title>
<style>
  :root {
    --green-deep: #2D6A4F;
    --green-mid:  #52B788;
    --green-light:#D8F3DC;
    --cream:      #FAFAF5;
    --text:       #2C2C2C;
    --text-sub:   #6B7B6B;
    --border:     #C8E6C9;
    --T-color:    #D0E8FF;
    --S-color:    #FFF0E0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── 헤더 ── */
  .header {
    width: 100%;
    background: var(--green-deep);
    color: #fff;
    text-align: center;
    padding: 32px 20px 24px;
  }
  .header .logo { font-size: 13px; letter-spacing: 3px; opacity: .7; margin-bottom: 8px; }
  .header h1 { font-size: 22px; font-weight: 700; line-height: 1.4; }
  .header p  { font-size: 13px; opacity: .75; margin-top: 8px; }

  /* ── 메인 카드 ── */
  .card {
    width: 100%;
    max-width: 520px;
    padding: 0 20px 60px;
  }

  /* ── 진행 바 ── */
  .progress-wrap {
    margin: 28px 0 4px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .progress-bar {
    flex: 1;
    height: 5px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--green-mid);
    border-radius: 99px;
    transition: width .4s ease;
  }
  .progress-label { font-size: 12px; color: var(--text-sub); white-space: nowrap; }

  /* ── 섹션 레이블 ── */
  .axis-label {
    margin: 20px 0 14px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--green-mid);
    text-transform: uppercase;
  }

  /* ── 질문 ── */
  .question-block { display: none; }
  .question-block.active { display: block; }

  .q-number {
    font-size: 11px;
    color: var(--text-sub);
    margin-bottom: 6px;
    font-weight: 600;
  }
  .q-text {
    font-size: 17px;
    font-weight: 700;
    line-height: 1.55;
    margin-bottom: 20px;
    color: var(--text);
  }

  /* ── 선택지 버튼 ── */
  .options { display: flex; flex-direction: column; gap: 12px; }
  .opt-btn {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px 18px;
    border: 2px solid var(--border);
    border-radius: 14px;
    background: #fff;
    cursor: pointer;
    text-align: left;
    transition: all .2s;
    width: 100%;
  }
  .opt-btn:hover { border-color: var(--green-mid); background: var(--green-light); }
  .opt-btn.selected {
    border-color: var(--green-deep);
    background: var(--green-light);
  }
  .opt-letter {
    width: 28px;
    height: 28px;
    min-width: 28px;
    border-radius: 50%;
    background: var(--green-light);
    color: var(--green-deep);
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
  }
  .opt-btn.selected .opt-letter {
    background: var(--green-deep);
    color: #fff;
  }
  .opt-text { font-size: 14px; line-height: 1.6; color: var(--text); }

  /* ── 네비게이션 ── */
  .nav {
    display: flex;
    justify-content: space-between;
    margin-top: 28px;
    gap: 12px;
  }
  .btn-prev, .btn-next {
    padding: 13px 28px;
    border-radius: 99px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all .2s;
  }
  .btn-prev {
    background: transparent;
    border: 2px solid var(--border);
    color: var(--text-sub);
  }
  .btn-prev:hover { border-color: var(--green-mid); color: var(--green-deep); }
  .btn-next {
    background: var(--green-deep);
    color: #fff;
    flex: 1;
  }
  .btn-next:hover { background: var(--green-mid); }
  .btn-next:disabled { background: #ccc; cursor: not-allowed; }

  /* ── 결과 화면 ── */
  #result-screen { display: none; padding-bottom: 60px; }
  .result-header {
    text-align: center;
    padding: 36px 20px 28px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .result-emoji { font-size: 60px; margin-bottom: 12px; }
  .result-code {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--green-mid);
    margin-bottom: 6px;
  }
  .result-name { font-size: 26px; font-weight: 800; margin-bottom: 10px; }
  .result-combo {
    display: inline-block;
    font-size: 12px;
    background: var(--green-light);
    color: var(--green-deep);
    padding: 4px 12px;
    border-radius: 99px;
    font-weight: 600;
  }

  .result-section { margin-bottom: 22px; }
  .result-section h3 {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--green-mid);
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .result-desc {
    font-size: 15px;
    line-height: 1.75;
    color: var(--text);
  }
  .keyword-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .keyword {
    font-size: 13px;
    background: var(--green-light);
    color: var(--green-deep);
    padding: 5px 14px;
    border-radius: 99px;
    font-weight: 600;
  }

  .result-plants {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
  }
  .result-plants h3 {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--green-mid);
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .plant-item {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
    font-size: 13px;
    color: var(--text);
    line-height: 1.55;
  }
  .plant-item span:first-child { font-weight: 700; min-width: 60px; color: var(--green-deep); }

  .axis-result {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 8px;
  }
  .axis-item {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
  }
  .axis-item .axis-val {
    font-size: 22px;
    font-weight: 800;
    color: var(--green-deep);
    margin-bottom: 4px;
  }
  .axis-item .axis-name { font-size: 12px; color: var(--text-sub); }

  .btn-retry {
    display: block;
    width: 100%;
    margin-top: 28px;
    padding: 15px;
    border-radius: 99px;
    background: var(--green-deep);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    text-align: center;
  }
  .btn-retry:hover { background: var(--green-mid); }

  /* 시작 화면 */
  #intro-screen { text-align: center; padding: 40px 20px; }
  #intro-screen .leaf { font-size: 48px; margin-bottom: 20px; }
  #intro-screen h2 { font-size: 20px; font-weight: 800; margin-bottom: 12px; }
  #intro-screen p { font-size: 14px; color: var(--text-sub); line-height: 1.8; margin-bottom: 28px; }
  .btn-start {
    display: inline-block;
    padding: 15px 40px;
    background: var(--green-deep);
    color: #fff;
    border: none;
    border-radius: 99px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }
  .btn-start:hover { background: var(--green-mid); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">숲에서 읽기 × 버트스튜디오</div>
  <h1>나는 어떤 산책 유형일까?</h1>
  <p>12가지 질문으로 알아보는 나의 산책 유형</p>
</div>

<!-- 시작 화면 -->
<div class="card" id="intro-screen">
  <div class="leaf">🌿</div>
  <h2>산책 유형 테스트</h2>
  <p>
    산책할 때 나는 어떤 사람인가요?<br>
    이름이 궁금한지, 분위기에 취하는지<br>
    멈추며 발견하는지, 걸음을 이어가는지<br><br>
    솔직하게 답할수록 더 정확한 결과가 나와요.
  </p>
  <button class="btn-start" onclick="startQuiz()">테스트 시작하기 →</button>
</div>

<!-- 설문 화면 -->
<div class="card" id="quiz-screen" style="display:none;">
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="progress-label" id="progress-label">1 / 12</div>
  </div>
  <div id="questions-wrap"></div>
  <div class="nav">
    <button class="btn-prev" id="btn-prev" onclick="prevQ()">← 이전</button>
    <button class="btn-next" id="btn-next" onclick="nextQ()">다음 →</button>
  </div>
</div>

<!-- 결과 화면 -->
<div class="card" id="result-screen">
  <div class="result-header">
    <div class="result-emoji" id="r-emoji"></div>
    <div class="result-code" id="r-code"></div>
    <div class="result-name" id="r-name"></div>
    <span class="result-combo" id="r-combo"></span>
  </div>
  <div class="result-section">
    <h3>유형 설명</h3>
    <p class="result-desc" id="r-desc"></p>
  </div>
  <div class="result-section">
    <h3>키워드</h3>
    <div class="keyword-wrap" id="r-keywords"></div>
  </div>
  <div class="result-section">
    <h3>나의 축 결과</h3>
    <div class="axis-result" id="r-axes"></div>
  </div>
  <div class="result-section">
    <div class="result-plants">
      <h3>🌿 나와 궁합이 잘 맞는 식물들</h3>
      <div id="r-plants"></div>
    </div>
  </div>
  <button class="btn-retry" onclick="retry()">🔄 다시 테스트하기</button>
</div>

<script>
const questions = [
  // T vs S
  { axis: "TS", axisLabel: "자연을 대하는 방식", text: "처음 보는 예쁜 꽃을 발견했을 때 나는?",
    a: { label: "A", text: "이름이 뭔지 찾아본다", val: "T" },

    b: { label: "B", text: "멈추지 않고 계속 걷는 게 더 편하다", val: "R" } },
  { axis: "ER", axisLabel: "산책하는 방식", text: "1시간 산책을 한다면?",
    a: { label: "A", text: "좁은 구역을 구석구석 천천히 본다", val: "E" },

  { axis: "OI", axisLabel: "주의의 방향", text: "산책 중에 나는 주로?",

  { axis: "OI", axisLabel: "주의의 방향", text: "산책 후 기억에 남는 건?",
    a: { label: "A", text: "봤던 것들 — 어떤 꽃, 어떤 풍경", val: "O" },
    b: { label: "B", text: "산책하면서 든 생각이나 감정", val: "I" } },
  { axis: "OI", axisLabel: "주의의 방향", text: "자연이 주는 가장 큰 선물은?",
    a: { label: "A", text: "새로운 발견과 관찰", val: "O" },
    b: { label: "B", text: "고요함과 생각 정리", val: "I" } },
  // W vs A
  { axis: "WA", axisLabel: "함께 또는 혼자", text: "좋은 풍경이나 식물을 발견하면?",

    b: { label: "B", text: "혼자 잠시 느끼고 싶다", val: "A" } },
  { axis: "WA", axisLabel: "함께 또는 혼자", text: "이상적인 산책 동반자는?",
    a: { label: "A", text: "이야기 나누면서 걸을 수 있는 사람", val: "W" },
    b: { label: "B", text: "말 없이 각자 걸어도 편한 사람", val: "A" } },
  { axis: "WA", axisLabel: "함께 또는 혼자", text: "자연에서 경험한 것을 나중에?",
    a: { label: "A", text: "누군가한테 이야기하고 싶다", val: "W" },
    b: { label: "B", text: "일기나 사진으로 혼자 남긴다", val: "A" } },
];

const types = {
  TEOW: { emoji:"🌻", name:"해바라기형", combo:"사고+탐색+외부+함께",
    desc:"발견한 것을 바로 나누고 싶은 열정적인 탐구자예요. 산책 중 제일 먼저 '이게 뭐야?' 하고 물어보는 사람. 지식과 경험을 함께 쌓고 싶어해요.",
    keywords:["지식욕","공유","에너지"], plants:["개나리 — 새로운 것을 제일 먼저 알아채는 성격이 닮았어요","민들레 — 어디서든 궁금한 걸 찾아내는 탐구 에너지가 잘 맞아요"] },

  TEIA: { emoji:"🌱", name:"고사리형", combo:"사고+탐색+내부+혼자",

    keywords:["깊이","고독","분석"], plants:["고사리 — 음지에서 혼자 깊이 뿌리내리는 모습이 닮았어요","이끼 — 천천히, 혼자, 섬세하게 퍼지는 삶의 방식이 잘 맞아요"] },
  TROW: { emoji:"🌲", name:"전나무형", combo:"사고+리듬+외부+함께",

  TROA: { emoji:"🎋", name:"대나무형", combo:"사고+리듬+외부+혼자",

const axisNames = {
  T: { name: "사고형", sub: "이름과 의미를 알고 싶어요" },
  S: { name: "감각형", sub: "분위기와 아름다움을 느껴요" },
  E: { name: "탐색형", sub: "멈추고 발견하며 걸어요" },
  R: { name: "리듬형", sub: "일정한 페이스로 계속 걸어요" },
  O: { name: "외부형", sub: "자연을 관찰해요" },
  I: { name: "내부형", sub: "자연 속에서 내면을 봐요" },
  W: { name: "함께형", sub: "발견을 나누고 싶어요" },
  A: { name: "혼자형", sub: "혼자 온전히 경험해요" },
};

let current = 0;
let answers = new Array(12).fill(null);

function startQuiz() {
  document.getElementById('intro-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  renderQuestions();
  updateUI();
}

function renderQuestions() {
  const wrap = document.getElementById('questions-wrap');
  wrap.innerHTML = '';
  questions.forEach((q, i) => {
    const div = document.createElement('div');
    div.className = 'question-block' + (i === 0 ? ' active' : '');
    div.id = 'q-' + i;
    div.innerHTML = `
      <div class="axis-label">${q.axisLabel}</div>
      <div class="q-number">Q${i+1}.</div>
      <div class="q-text">${q.text}</div>
      <div class="options">
        <button class="opt-btn" id="opt-${i}-a" onclick="selectAnswer(${i},'a')">
          <div class="opt-letter">A</div>
          <div class="opt-text">${q.a.text}</div>
        </button>
        <button class="opt-btn" id="opt-${i}-b" onclick="selectAnswer(${i},'b')">
          <div class="opt-letter">B</div>
          <div class="opt-text">${q.b.text}</div>
        </button>
      </div>`;
    wrap.appendChild(div);
  });
}

function selectAnswer(idx, choice) {
  answers[idx] = choice;
  document.getElementById('opt-'+idx+'-a').classList.toggle('selected', choice==='a');
  document.getElementById('opt-'+idx+'-b').classList.toggle('selected', choice==='b');
  updateUI();
  setTimeout(() => {
    if (idx < 11) { current = idx + 1; updateUI(); }
  }, 300);
}

function prevQ() { if (current > 0) { current--; updateUI(); } }
function nextQ() {
  if (current < 11) { current++; updateUI(); }
  else { showResult(); }
}

function updateUI() {
  questions.forEach((_, i) => {
    document.getElementById('q-'+i).classList.toggle('active', i===current);
  });
  const ans = answers[current];
  if (ans !== null) {
    document.getElementById('opt-'+current+'-a').classList.toggle('selected', ans==='a');
    document.getElementById('opt-'+current+'-b').classList.toggle('selected', ans==='b');
  } else {
    if(document.getElementById('opt-'+current+'-a')) {
      document.getElementById('opt-'+current+'-a').classList.remove('selected');
      document.getElementById('opt-'+current+'-b').classList.remove('selected');
    }
  }
  const filled = answers.filter(a=>a!==null).length;
  const pct = (filled / 12) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = (current+1) + ' / 12';

  const isLast = current === 11;
  const nextBtn = document.getElementById('btn-next');
  nextBtn.textContent = isLast ? '결과 보기 🌿' : '다음 →';
  nextBtn.disabled = answers[current] === null;
  document.getElementById('btn-prev').style.visibility = current === 0 ? 'hidden' : 'visible';
}

function calcResult() {
  const scores = { T:0, S:0, E:0, R:0, O:0, I:0, W:0, A:0 };
  questions.forEach((q, i) => {
    if (answers[i] === 'a') scores[q.a.val]++;
    else if (answers[i] === 'b') scores[q.b.val]++;
  });
  const t = scores.T >= scores.S ? 'T' : 'S';
  const e = scores.E >= scores.R ? 'E' : 'R';
  const o = scores.O >= scores.I ? 'O' : 'I';
  const w = scores.W >= scores.A ? 'W' : 'A';
  return { code: t+e+o+w, scores };
}

function showResult() {
  const unanswered = answers.filter(a=>a===null).length;
  if (unanswered > 0) {
    alert(`아직 답하지 않은 문항이 ${unanswered}개 있어요. 모두 답한 후 결과를 확인하세요.`);
    current = answers.indexOf(null);
    updateUI();
    return;
  }
  const { code, scores } = calcResult();
  const type = types[code];

  document.getElementById('quiz-screen').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.style.display = 'block';

  document.getElementById('r-emoji').textContent = type.emoji;
  document.getElementById('r-code').textContent = code;
  document.getElementById('r-name').textContent = type.name;
  document.getElementById('r-combo').textContent = type.combo;
  document.getElementById('r-desc').textContent = type.desc;

  const kw = document.getElementById('r-keywords');
  kw.innerHTML = type.keywords.map(k=>`<span class="keyword">${k}</span>`).join('');

  const axes = document.getElementById('r-axes');
  const axisVals = [code[0], code[1], code[2], code[3]];
  axes.innerHTML = axisVals.map(v => `
    <div class="axis-item">
      <div class="axis-val">${v}</div>
      <div class="axis-name">${axisNames[v].name}</div>
      <div class="axis-name" style="font-size:10px;margin-top:3px;color:#9EB09E">${axisNames[v].sub}</div>
    </div>`).join('');

  const pl = document.getElementById('r-plants');
  pl.innerHTML = type.plants.map(p => {
    const [name, desc] = p.split(' — ');
    return `<div class="plant-item"><span>${name}</span><span>${desc}</span></div>`;
  }).join('');

  rs.scrollTop = 0;
  window.scrollTo(0,0);
}

function retry() {
  answers = new Array(12).fill(null);
  current = 0;
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  renderQuestions();
  updateUI();
}

document.addEventListener('change', () => updateUI());
</script>
